<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8700"/>
      <stop offset="25%" stop-color="#E80020"/>
      <stop offset="50%" stop-color="#3671C6"/>
      <stop offset="75%" stop-color="#27F4D2"/>
      <stop offset="100%" stop-color="#FF87BC"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E80020" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E80020" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.5" fill="white" opacity="0.08"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>

  <!-- Red glow behind logo -->
  <ellipse cx="400" cy="130" rx="120" ry="80" fill="url(#redGlow)"/>

  <!-- BB Logo -->
  <rect x="370" y="60" width="60" height="60" rx="14" fill="#E80020" filter="url(#glow)"/>
  <text x="400" y="100" text-anchor="middle" font-size="24" font-weight="900" fill="white" letter-spacing="-1">BB</text>

  <!-- Title -->
  <text x="400" y="170" text-anchor="middle" font-size="48" font-weight="900" fill="white" letter-spacing="-2">
    Box <tspan fill="#E80020">Box</tspan>
  </text>

  <!-- Subtitle -->
  <text x="400" y="200" text-anchor="middle" font-size="14" fill="#888" letter-spacing="0.5">
    F1 Fantasy Head-to-Head
  </text>

  <!-- Rainbow line -->
  <rect x="100" y="225" width="600" height="2" rx="1" fill="url(#rainbow)" opacity="0.6"/>

  <!-- Three stat cards -->
  <!-- Card 1: Drivers -->
  <rect x="115" y="250" width="170" height="130" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="115" y="250" width="170" height="3" rx="1.5" fill="#FF8700"/>
  <text x="200" y="295" text-anchor="middle" font-size="36" font-weight="900" fill="#E80020">22</text>
  <text x="200" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="white">Drivers</text>
  <text x="200" y="338" text-anchor="middle" font-size="10" fill="#666">Use each once</text>
  <text x="200" y="352" text-anchor="middle" font-size="10" fill="#666">per season</text>

  <!-- Card 2: Constructors -->
  <rect x="315" y="250" width="170" height="130" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="315" y="250" width="170" height="3" rx="1.5" fill="#3671C6"/>
  <text x="400" y="295" text-anchor="middle" font-size="36" font-weight="900" fill="#E80020">11</text>
  <text x="400" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="white">Constructors</text>
  <text x="400" y="338" text-anchor="middle" font-size="10" fill="#666">Pair them</text>
  <text x="400" y="352" text-anchor="middle" font-size="10" fill="#666">strategically</text>

  <!-- Card 3: Race Control -->
  <rect x="515" y="250" width="170" height="130" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="515" y="250" width="170" height="3" rx="1.5" fill="#27F4D2"/>
  <text x="600" y="295" text-anchor="middle" font-size="36" font-weight="900" fill="#E80020">RC</text>
  <text x="600" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="white">Race Control</text>
  <text x="600" y="338" text-anchor="middle" font-size="10" fill="#666">Bet on chaos</text>
  <text x="600" y="352" text-anchor="middle" font-size="10" fill="#666">and score big</text>

  <!-- Bottom tagline -->
  <text x="400" y="420" text-anchor="middle" font-size="12" fill="#555" letter-spacing="1">
    NEXT.JS • TYPESCRIPT • PRISMA • REAL F1 DATA
  </text>
</svg>
